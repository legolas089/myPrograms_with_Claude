<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Editor</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>PDF Editor</h1>
      <nav>
        <button class="tab-btn active" data-tab="merge">합치기</button>
        <button class="tab-btn" data-tab="split">분리 / 정렬</button>
        <button class="tab-btn" data-tab="mergesort">합치기 / 정렬</button>
      </nav>
    </header>

    <!-- ── Merge Tab ── -->
    <section id="tab-merge" class="tab-content active">
      <div class="drop-zone" id="merge-drop">
        <div class="drop-icon">&#128196;</div>
        <p>PDF 파일들을 드래그하거나 클릭하여 추가</p>
        <button class="btn-add" id="merge-add-btn">파일 추가</button>
        <input type="file" id="merge-file-input" accept=".pdf" multiple hidden>
      </div>
      <div id="merge-list" class="file-list"></div>
      <div id="merge-actions" class="actions" style="display:none">
        <button class="btn-primary" id="merge-btn">합치기</button>
        <button class="btn-secondary" id="merge-clear-btn">전체 삭제</button>
      </div>
    </section>

    <!-- ── Split Tab ── -->
    <section id="tab-split" class="tab-content">
      <div class="drop-zone" id="split-drop">
        <div class="drop-icon">&#9986;</div>
        <p>분리할 PDF 파일을 드래그하거나 클릭하여 선택</p>
        <button class="btn-add" id="split-add-btn">파일 선택</button>
        <input type="file" id="split-file-input" accept=".pdf" hidden>
      </div>
      <div id="split-info" style="display:none">
        <div class="file-info">
          <span id="split-filename"></span>
          <span id="split-pagecount"></span>
          <span id="split-selected-count"></span>
          <button class="btn-small btn-remove" id="split-remove-btn">&#10060;</button>
        </div>
        <div class="page-toolbar">
          <button class="btn-small" id="select-all-btn">전체 선택</button>
          <button class="btn-small" id="deselect-all-btn">전체 해제</button>
          <button class="btn-small" id="invert-select-btn">선택 반전</button>
          <span class="toolbar-divider"></span>
          <span class="hint">드래그로 순서 변경 | 체크박스로 페이지 선택</span>
        </div>
        <div id="split-preview" class="page-preview"></div>
        <div class="split-options">
          <h3>작업 선택</h3>
          <label class="radio-label">
            <input type="radio" name="split-mode" value="save-reorder" checked>
            선택한 페이지를 현재 순서로 저장 (1개 PDF)
          </label>
          <label class="radio-label">
            <input type="radio" name="split-mode" value="all">
            선택한 페이지를 각각 개별 PDF로 분리
          </label>
          <label class="radio-label">
            <input type="radio" name="split-mode" value="range">
            페이지 범위 지정으로 분리
          </label>
          <div id="range-input-wrap" style="display:none">
            <input type="text" id="split-range" placeholder="예: 1-3, 5, 7-10">
            <p class="hint">쉼표로 구분. 각 범위가 하나의 PDF가 됩니다.</p>
          </div>
        </div>
        <div class="actions">
          <button class="btn-primary" id="split-btn">실행</button>
        </div>
      </div>
    </section>

    <!-- ── Merge+Sort Tab ── -->
    <section id="tab-mergesort" class="tab-content">
      <div class="drop-zone" id="ms-drop">
        <div class="drop-icon">&#128203;</div>
        <p>여러 PDF 파일을 드래그하거나 클릭하여 추가</p>
        <button class="btn-add" id="ms-add-btn">파일 추가</button>
        <input type="file" id="ms-file-input" accept=".pdf" multiple hidden>
      </div>
      <div id="ms-workspace" style="display:none">
        <div id="ms-file-list" class="ms-file-list"></div>
        <div class="page-toolbar">
          <button class="btn-small" id="ms-select-all-btn">전체 선택</button>
          <button class="btn-small" id="ms-deselect-all-btn">전체 해제</button>
          <button class="btn-small" id="ms-invert-btn">선택 반전</button>
          <span class="toolbar-divider"></span>
          <span id="ms-selected-count"></span>
          <span class="toolbar-divider"></span>
          <span class="hint">드래그로 순서 변경 | 체크박스로 페이지 선택/제외</span>
        </div>
        <div id="ms-preview" class="page-preview"></div>
        <div class="actions">
          <button class="btn-primary" id="ms-save-btn">저장</button>
          <button class="btn-secondary" id="ms-clear-btn">초기화</button>
        </div>
      </div>
    </section>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">처리 중...</p>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
