<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEP Viewer</title>
  <link rel="stylesheet" href="css/style.css">
  <script async src="https://cdn.jsdelivr.net/npm/occt-import-js@0.0.23/dist/occt-import-js.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.175.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.175.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="drop-overlay">
    <div class="drop-message">
      <div class="drop-icon">&#128230;</div>
      <p>.STEP / .STP 파일을 여기에 놓으세요</p>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <p>STEP 파일 로딩 중...</p>
  </div>

  <div id="sidebar">
    <h2>Assembly Tree</h2>
    <div id="tree-container"></div>
  </div>

  <div id="viewer-container">
    <div id="toolbar">
      <button id="btn-measure" title="거리 측정 (M)">&#128207; 측정</button>
      <button id="btn-clear-measure" title="측정 초기화">&#10060; 초기화</button>
    </div>

    <div id="measure-panel">
      <div class="measure-step" id="step1">
        <div class="step-header">
          <span class="step-dot dot-red"></span>
          <span>첫 번째 선택</span>
        </div>
        <div class="step-buttons">
          <button class="pick-type-btn" data-step="1" data-type="point">&#11044; 점</button>
          <button class="pick-type-btn" data-step="1" data-type="edge">&#9135; 선</button>
          <button class="pick-type-btn" data-step="1" data-type="face">&#11036; 면</button>
        </div>
        <div class="step-info" id="step1-info">유형을 선택하세요</div>
      </div>
      <div class="measure-step disabled" id="step2">
        <div class="step-header">
          <span class="step-dot dot-orange"></span>
          <span>두 번째 선택</span>
        </div>
        <div class="step-buttons">
          <button class="pick-type-btn" data-step="2" data-type="point">&#11044; 점</button>
          <button class="pick-type-btn" data-step="2" data-type="edge">&#9135; 선</button>
          <button class="pick-type-btn" data-step="2" data-type="face">&#11036; 면</button>
        </div>
        <div class="step-info" id="step2-info">유형을 선택하세요</div>
      </div>
      <div id="measure-result"></div>
    </div>

    <canvas id="viewer-canvas"></canvas>
    <div id="initial-message">
      <div class="drop-icon">&#128230;</div>
      <p>.STEP / .STP 파일을 드래그하거나 버튼으로 선택하세요</p>
      <button id="file-open-btn">파일 열기</button>
      <input type="file" id="file-input" accept=".step,.stp" hidden>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
